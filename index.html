<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Push-Up Counter Pro</title>
    <style>
        :root {
            --bg-color: #121824;
            --card-bg: #1e293b;
            --primary-color: #00e676;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --calendar-border: #334155;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-y: auto;
            user-select: none;
            -webkit-user-select: none;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 90vw;
            max-width: 360px;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 14px;
            color: var(--text-sub);
        }
        select {
            background: var(--card-bg);
            color: var(--text-main);
            border: 2px solid #334155;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: bold;
            outline: none;
        }
        .tap-zone {
            background: var(--card-bg);
            width: 100%;
            height: 35vh;
            max-height: 260px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 4px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.05s ease, border-color 0.2s;
            box-sizing: border-box;
        }
        .tap-zone:active {
            transform: scale(0.97);
            border-color: var(--primary-color);
        }
        .circle-container {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .circle-svg {
            transform: rotate(-90deg);
            position: absolute;
        }
        .circle-bg {
            fill: none;
            stroke: #0f172a;
            stroke-width: 10;
        }
        .circle-progress {
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s ease-out;
        }
        .counter-box {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .counter-display {
            font-size: 40px;
            font-weight: 900;
            line-height: 1;
        }
        .reps-label {
            font-size: 11px;
            color: var(--text-sub);
            font-weight: bold;
        }
        #statusMessage {
            position: absolute;
            bottom: 12px;
            font-size: 13px;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        /* 📅 カレンダーエリア */
        .calendar-card {
            background: var(--card-bg);
            width: 100%;
            border-radius: 24px;
            border: 2px solid var(--calendar-border);
            padding: 16px;
            box-sizing: border-box;
            min-height: 280px;
        }
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .calendar-nav button {
            background: #334155;
            color: var(--text-main);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .calendar-nav button:active {
            background: #475569;
        }
        .calendar-header {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-main);
        }
        
        .calendar-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }
        .calendar-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .calendar-cell {
            width: 14.28%;
            text-align: center;
            font-size: 12px;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
        }
        .calendar-day-header {
            font-weight: bold;
            color: #64748b;
            border-bottom: 1px solid var(--calendar-border);
            padding-bottom: 6px;
            margin-bottom: 4px;
        }
        
        .day-btn {
            display: block;
            width: 28px;
            height: 28px;
            line-height: 26px;
            border-radius: 50%;
            background: transparent;
            color: var(--text-main);
            border: 1px solid transparent;
            font-size: 12px;
            cursor: pointer;
            box-sizing: border-box;
            padding: 0;
            text-align: center;
        }
        .workout-day {
            background-color: rgba(0, 230, 118, 0.15);
            color: var(--primary-color);
            font-weight: bold;
            border: 1px solid var(--primary-color);
        }
        .empty-cell {
            visibility: hidden;
        }
        .btn-reset {
            background: transparent;
            border: 2px solid #334155;
            color: var(--text-sub);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="info-bar">
            <div>
                <label for="targetSelect">目標:</label>
                <select id="targetSelect">
                    <option value="10">10回</option>
                    <option value="15">15回</option>
                    <option value="20" selected>20回</option>
                    <option value="30">30回</option>
                    <option value="50">50回</option>
                </select>
            </div>
            <div id="totalStats">累計: 0回</div>
        </div>

        <div id="tapZone" class="tap-zone">
            <div class="circle-container">
                <svg class="circle-svg" width="140" height="140">
                    <circle class="circle-bg" cx="70" cy="70" r="60"></circle>
                    <circle id="progressBar" class="circle-progress" cx="70" cy="70" r="60"></circle>
                </svg>
                <div class="counter-box">
                    <div id="counter" class="counter-display">0</div>
                    <div class="reps-label">REPS</div>
                    <div style="font-size:10px; color:var(--text-sub);">/ <span id="targetLabel">20</span>回</div>
                </div>
            </div>
            <div id="statusMessage">アゴでタップ！</div>
        </div>

        <button id="resetBtn" class="btn-reset">セッションリセット</button>

        <div class="calendar-card">
            <div class="calendar-nav">
                <button id="prevMonthBtn">◀</button>
                <div id="calendarTitle" class="calendar-header">2026年 7月</div>
                <button id="nextMonthBtn">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <script>
        let count = 0;
        let target = 20;
        let jaVoice = null;
        let isCompleted = false;

        let currentCalendarDate = new Date();

        const RADIUS = 60;
        const CIRCUMFERENCE = 2 * Math.PI * RADIUS;

        const tapZone = document.getElementById('tapZone');
        const counterEl = document.getElementById('counter');
        const progressBar = document.getElementById('progressBar');
        const targetSelect = document.getElementById('targetSelect');
        const targetLabel = document.getElementById('targetLabel');
        const resetBtn = document.getElementById('resetBtn');
        const statusMessage = document.getElementById('statusMessage');
        const totalStatsEl = document.getElementById('totalStats');
        const calendarGrid = document.getElementById('calendarGrid');
        const calendarTitle = document.getElementById('calendarTitle');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');

        progressBar.style.strokeDasharray = CIRCUMFERENCE;
        progressBar.style.strokeDashoffset = CIRCUMFERENCE;

        function formatDateString(year, month, day) {
            const m = String(month + 1).padStart(2, '0');
            const d = String(day).padStart(2, '0');
            return `${year}-${m}-${d}`;
        }

        function getTodayString() {
            const now = new Date();
            return formatDateString(now.getFullYear(), now.getMonth(), now.getDate());
        }

        function loadLogs() {
            const logs = JSON.parse(localStorage.getItem('pushup_logs') || '{}');
            let total = 0;
            for (let date in logs) {
                total += logs[date];
            }
            totalStatsEl.textContent = `累計: ${total}回`;
            renderCalendar(logs);
        }

        function saveLog(reps) {
            const logs = JSON.parse(localStorage.getItem('pushup_logs') || '{}');
            const today = getTodayString();
            logs[today] = (logs[today] || 0) + reps;
            localStorage.setItem('pushup_logs', JSON.stringify(logs));
            loadLogs();
        }

        window.editLogValue = function(dateStr, currentReps) {
            const displayDate = dateStr.replace(/(\d{4})-(\d{2})-(\d{2})/, "$1年$2月$3日");
            const input = prompt(`【回数編集】\n${displayDate} の合計回数を入力してください（0にすると記録が消えます）:`, currentReps);
            
            if (input === null) return;

            const newReps = parseInt(input);
            if (isNaN(newReps) || newReps < 0) {
                alert("正しい数値を入力してください。");
                return;
            }

            const logs = JSON.parse(localStorage.getItem('pushup_logs') || '{}');
            if (newReps === 0) {
                delete logs[dateStr];
            } else {
                logs[dateStr] = newReps;
            }

            localStorage.setItem('pushup_logs', JSON.stringify(logs));
            loadLogs();
        };

        function renderCalendar(logs) {
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            
            calendarTitle.textContent = `${year}年 ${month + 1}月`;
            calendarGrid.innerHTML = '';

            const days = ['日', '月', '火', '水', '木', '金', '土'];
            let headerRow = document.createElement('div');
            headerRow.className = 'calendar-row calendar-day-header';
            days.forEach(d => {
                const cell = document.createElement('div');
                cell.className = 'calendar-cell';
                cell.textContent = d;
                headerRow.appendChild(cell);
            });
            calendarGrid.appendChild(headerRow);

            const firstDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            let currentDay = 1;
            let finished = false;

            for (let i = 0; i < 6; i++) {
                if (finished) break;
                
                let row = document.createElement('div');
                row.className = 'calendar-row';
                let hasCells = false;

                for (let j = 0; j < 7; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'calendar-cell';

                    if (i === 0 && j < firstDay) {
                        cell.innerHTML = '<span class="empty-cell">.</span>';
                    } else if (currentDay > totalDays) {
                        cell.innerHTML = '<span class="empty-cell">.</span>';
                        finished = true;
                    } else {
                        const dateStr = formatDateString(year, month, currentDay);
                        const reps = logs[dateStr] || 0;
                        
                        const btn = document.createElement('button');
                        btn.className = 'day-btn';
                        btn.textContent = currentDay;
                        
                        if (reps > 0) {
                            btn.classList.add('workout-day');
                        }
                        
                        btn.onclick = (function(dStr, rCount) {
                            return function() { window.editLogValue(dStr, rCount); };
                        })(dateStr, reps);

                        cell.appendChild(btn);
                        currentDay++;
                        hasCells = true;
                    }
                    row.appendChild(cell);
                }
                if (i > 0 && !hasCells) break;
                calendarGrid.appendChild(row);
            }
        }

        prevMonthBtn.addEventListener('click', () => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() - 1);
            loadLogs();
        });
        nextMonthBtn.addEventListener('click', () => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + 1);
            loadLogs();
        });

        function loadVoices() {
            const voices = speechSynthesis.getVoices();
            jaVoice = voices.find(voice => voice.lang === 'ja-JP' && voice.name.includes('Google')) || 
                      voices.find(voice => voice.lang === 'ja-JP' && voice.name.includes('Otoya')) || 
                      voices.find(voice => voice.lang === 'ja-JP');
        }
        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

        // ✨ イントネーション改良版の音声合成ロジック
        function speak(text, isFinish = false) {
            speechSynthesis.cancel();
            
            if (isFinish) {
                // 読点とスペースによる「タメ」を生成
                text = "目標達成。ナイス、バ ル ク！";
            }

            const utterance = new SpeechSynthesisUtterance(text);
            if (jaVoice) utterance.voice = jaVoice;
            else utterance.lang = 'ja-JP';

            if (isFinish) {
                utterance.rate = 0.95;  // 達成時は少しゆっくり、重厚に
                utterance.pitch = 1.15; // テンションを上げて少し高音に
            } else {
                utterance.rate = 1.1;    // カウントはテンポよく
                utterance.pitch = 0.8;   // 低音でストイックに
            }
            
            speechSynthesis.speak(utterance);
        }

        function updateGauge() {
            const ratio = Math.min(count / target, 1);
            progressBar.style.strokeDashoffset = CIRCUMFERENCE - (ratio * CIRCUMFERENCE);
        }

        function handleCount() {
            if (isCompleted) return;
            count++;
            counterEl.textContent = count;
            updateGauge();
            saveLog(1);

            if (count >= target) {
                isCompleted = true;
                statusMessage.textContent = "🔥 NICE BULK!!! 🔥";
                speak("目標達成！ナイスバルク！", true);
            } else {
                speak(String(count));
            }
        }

        tapZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleCount();
        });
        tapZone.addEventListener('mousedown', (e) => {
            if (e.type === 'mousedown' && 'ontouchstart' in window) return;
            handleCount();
        });

        targetSelect.addEventListener('change', (e) => {
            target = parseInt(e.target.value);
            targetLabel.textContent = target;
            resetCount();
        });

        function resetCount() {
            count = 0;
            isCompleted = false;
            counterEl.textContent = "0";
            statusMessage.textContent = "アゴでタップ！";
            updateGauge();
            speechSynthesis.cancel();
        }
        resetBtn.addEventListener('click', resetCount);

        window.addEventListener('DOMContentLoaded', loadLogs);
    </script>
</body>
</html>
