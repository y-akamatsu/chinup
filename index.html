<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Push-Up Counter (TFJS)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

    <style>
        :root {
            --bg-color: #121824;
            --card-bg: #1e293b;
            --primary-color: #00e676;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 90vw;
            max-width: 360px;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 14px;
            color: var(--text-sub);
        }
        select {
            background: var(--card-bg);
            color: var(--text-main);
            border: 2px solid #334155;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: bold;
            outline: none;
        }
        .main-card {
            background: var(--card-bg);
            width: 100%;
            height: 65vh;
            max-height: 460px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 4px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .circle-container {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .circle-svg {
            transform: rotate(-90deg);
            position: absolute;
        }
        .circle-bg {
            fill: none;
            stroke: #0f172a;
            stroke-width: 12;
        }
        .circle-progress {
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.2s ease-out;
        }
        .counter-box {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .counter-display {
            font-size: 64px;
            font-weight: 900;
            line-height: 1;
        }
        .reps-label {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .target-display {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 4px;
        }
        .camera-box {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 70px;
            height: 52px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #334155;
            background: #000;
            transform: scaleX(-1);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .ai-indicator {
            position: absolute;
            top: 24px;
            left: 24px;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        .dot.active {
            background-color: var(--primary-color);
            box-shadow: 0 0 8px var(--primary-color);
        }
        #statusMessage {
            position: absolute;
            bottom: 24px;
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-color);
        }
        .btn-reset {
            background: transparent;
            border: 2px solid #334155;
            color: var(--text-sub);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-reset:hover {
            border-color: #ef4444;
            color: #ef4444;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="info-bar">
            <div>
                <label for="targetSelect">目標:</label>
                <select id="targetSelect">
                    <option value="10">10回</option>
                    <option value="15">15回</option>
                    <option value="20" selected>20回</option>
                    <option value="30">30回</option>
                </select>
            </div>
            <div id="totalStats">累計: 0回</div>
        </div>

        <div class="main-card">
            <div class="ai-indicator">
                <div id="aiDot" class="dot"></div>
                <span id="aiText">AIシステム起動中...</span>
            </div>

            <div class="camera-box">
                <video id="webcam" autoplay playsinline muted></video>
            </div>

            <div class="circle-container">
                <svg class="circle-svg" width="220" height="220">
                    <circle class="circle-bg" cx="110" cy="110" r="98"></circle>
                    <circle id="progressBar" class="circle-progress" cx="110" cy="110" r="98"></circle>
                </svg>
                <div class="counter-box">
                    <div id="counter" class="counter-display">0</div>
                    <div class="reps-label">REPS</div>
                    <div class="target-display">/ <span id="targetLabel">20</span> 回</div>
                </div>
            </div>

            <div id="statusMessage">AI読み込み中...</div>
        </div>

        <button id="resetBtn" class="btn-reset">リセット</button>
    </div>

    <script>
        let count = 0;
        let target = 20;
        let jaVoice = null;
        let isCompleted = false;
        let isDown = false; 
        let model = null;

        const RADIUS = 98;
        const CIRCUMFERENCE = 2 * Math.PI * RADIUS;

        const videoElement = document.getElementById('webcam');
        const counterEl = document.getElementById('counter');
        const progressBar = document.getElementById('progressBar');
        const targetSelect = document.getElementById('targetSelect');
        const targetLabel = document.getElementById('targetLabel');
        const resetBtn = document.getElementById('resetBtn');
        const statusMessage = document.getElementById('statusMessage');
        const totalStatsEl = document.getElementById('totalStats');
        const aiDot = document.getElementById('aiDot');
        const aiText = document.getElementById('aiText');

        progressBar.style.strokeDasharray = `${CIRCUMFERENCE} ${CIRCUMFERENCE}`;
        progressBar.style.strokeDashoffset = CIRCUMFERENCE;

        function loadTotalCount() {
            const savedTotal = localStorage.getItem('pushup_total') || 0;
            totalStatsEl.textContent = `累計: ${savedTotal}回`;
        }

        function saveToTotal(reps) {
            const currentTotal = parseInt(localStorage.getItem('pushup_total') || 0);
            localStorage.setItem('pushup_total', currentTotal + reps);
            loadTotalCount();
        }
        loadTotalCount();

        function loadVoices() {
            const voices = speechSynthesis.getVoices();
            jaVoice = voices.find(voice => voice.lang === 'ja-JP' && voice.name.includes('Google')) || 
                      voices.find(voice => voice.lang === 'ja-JP' && voice.name.includes('Otoya')) || 
                      voices.find(voice => voice.lang === 'ja-JP');
        }
        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

        function speak(text, isFinish = false) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (jaVoice) utterance.voice = jaVoice;
            else utterance.lang = 'ja-JP';
            utterance.rate = 1.1;
            utterance.pitch = isFinish ? 1.0 : 0.8;
            speechSynthesis.speak(utterance);
        }

        function updateGauge() {
            const ratio = Math.min(count / target, 1);
            progressBar.style.strokeDashoffset = CIRCUMFERENCE - (ratio * CIRCUMFERENCE);
        }

        function handleCount() {
            if (isCompleted) return;
            count++;
            counterEl.textContent = count;
            updateGauge();
            saveToTotal(1);

            if (count >= target) {
                isCompleted = true;
                statusMessage.textContent = "🔥 NICE BULK!!! 🔥";
                speak("目標達成！ナイスバルク！", true);
            } else {
                speak(String(count));
            }
        }

        // ✨ カメラのストリームを起動する関数
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: 320, height: 240 },
                audio: false
            });
            videoElement.srcObject = stream;
            return new Promise((resolve) => {
                videoElement.onloadedmetadata = () => resolve(videoElement);
            });
        }

        // ✨ AIモデル（Blazeface）を読み込んでループ処理を開始する関数
        async function initAI() {
            try {
                statusMessage.textContent = "AIモデルを準備中...";
                await setupCamera();
                videoElement.play();

                // Blazefaceモデルのロード
                model = await blazeface.load();
                
                // 初期化完了時のUI変更
                aiDot.classList.add('active');
                aiText.textContent = "AI稼働中";
                statusMessage.textContent = "準備完了！床に置いてね";

                // AIループスタート
                detectFaceLoop();
            } catch (e) {
                console.error(e);
                statusMessage.textContent = "エラー: カメラかAIの起動に失敗";
            }
        }

        // ✨ 毎フレームの顔認識ループ処理
        async function detectFaceLoop() {
            if (model && videoElement.readyState >= 2) {
                const predictions = await model.estimateFaces(videoElement, false);

                if (predictions.length > 0) {
                    const prediction = predictions[0];
                    
                    // 顔の対角線上のサイズ（右上の座標と左下の座標の距離から算出）
                    const start = prediction.topLeft;
                    const end = prediction.bottomRight;
                    const faceSize = (end[0] - start[0]) / videoElement.videoWidth;

                    // TensorFlow.js用にチューニングした距離（深度）のしきい値
                    const DOWN_THRESHOLD = 0.40; 
                    const UP_THRESHOLD = 0.32;   

                    if (!isDown && faceSize > DOWN_THRESHOLD) {
                        isDown = true;
                        statusMessage.textContent = "キープ！";
                    } else if (isDown && faceSize < UP_THRESHOLD) {
                        isDown = false;
                        statusMessage.textContent = "アップ！";
                        handleCount();
                    }
                }
            }
            // 次のフレームを要求（バッテリー消費を抑えつつ高速にループ）
            requestAnimationFrame(detectFaceLoop);
        }

        // ページ読み込み完了後にAIを初期化
        window.addEventListener('DOMContentLoaded', initAI);

        targetSelect.addEventListener('change', (e) => {
            target = parseInt(e.target.value);
            targetLabel.textContent = target;
            resetCount();
        });

        function resetCount() {
            count = 0;
            isCompleted = false;
            isDown = false;
            counterEl.textContent = "0";
            statusMessage.textContent = "準備完了！";
            updateGauge();
            speechSynthesis.cancel();
        }
        resetBtn.addEventListener('click', resetCount);
    </script>
</body>
</html>
