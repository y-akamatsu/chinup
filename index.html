<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Push-Up Counter with Calendar</title>
    <style>
        :root {
            --bg-color: #121824;
            --card-bg: #1e293b;
            --primary-color: #00e676;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --calendar-border: #334155;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-y: auto;
            user-select: none;
            -webkit-user-select: none;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 90vw;
            max-width: 360px;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 14px;
            color: var(--text-sub);
        }
        select {
            background: var(--card-bg);
            color: var(--text-main);
            border: 2px solid #334155;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: bold;
            outline: none;
        }
        /* メインカウンターカード */
        .tap-zone {
            background: var(--card-bg);
            width: 100%;
            height: 45vh;
            max-height: 320px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 4px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.05s ease, border-color 0.2s;
        }
        .tap-zone:active {
            transform: scale(0.97);
            border-color: var(--primary-color);
        }
        .circle-container {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .circle-svg {
            transform: rotate(-90deg);
            position: absolute;
        }
        .circle-bg {
            fill: none;
            stroke: #0f172a;
            stroke-width: 10;
        }
        .circle-progress {
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.2s ease-out;
        }
        .counter-box {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .counter-display {
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
        }
        .reps-label {
            font-size: 12px;
            color: var(--text-sub);
            font-weight: bold;
            margin-top: 2px;
        }
        #statusMessage {
            position: absolute;
            bottom: 16px;
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        /* ✨ カレンダーエリアのデザイン */
        .calendar-card {
            background: var(--card-bg);
            width: 100%;
            border-radius: 24px;
            border: 2px solid var(--calendar-border);
            padding: 16px;
            box-sizing: border-box;
        }
        .calendar-header {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            color: var(--text-main);
        }
        .calendar-grid {
            display: table;
            width: 100%;
            border-collapse: collapse;
        }
        .calendar-row {
            display: table-row;
        }
        .calendar-cell {
            display: table-cell;
            width: 14.28%;
            text-align: center;
            padding: 8px 0;
            font-size: 12px;
            color: var(--text-sub);
            vertical-align: middle;
        }
        .calendar-day-header {
            font-weight: bold;
            color: #64748b;
            border-bottom: 1px solid var(--calendar-border);
        }
        /* ✨ 筋トレを達成した日の丸バッジ */
        .workout-day {
            display: block;
            width: 26px;
            height: 26px;
            line-height: 26px;
            margin: 0 auto;
            border-radius: 50%;
            background-color: rgba(0, 230, 118, 0.15);
            color: var(--primary-color);
            font-weight: bold;
            border: 1px solid var(--primary-color);
        }
        .empty-cell {
            color: transparent;
        }

        .actions {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
        }
        .btn-reset {
            background: transparent;
            border: 2px solid #334155;
            color: var(--text-sub);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="info-bar">
            <div>
                <label for="targetSelect">目標:</label>
                <select id="targetSelect">
                    <option value="10">10回</option>
                    <option value="15">15回</option>
                    <option value="20" selected>20回</option>
                    <option value="30">30回</option>
                    <option value="50">50回</option>
                </select>
            </div>
            <div id="totalStats">累計: 0回</div>
        </div>

        <div id="tapZone" class="tap-zone">
            <div class="circle-container">
                <svg class="circle-svg" width="160" height="160">
                    <circle class="circle-bg" cx="80" cy="80" r="70"></circle>
                    <circle id="progressBar" class="circle-progress" cx="80" cy="80" r="70"></circle>
                </svg>
                <div class="counter-box">
                    <div id="counter" class="counter-display">0</div>
                    <div class="reps-label">REPS</div>
                    <div style="font-size:11px; color:var(--text-sub); margin-top:2px;">/ <span id="targetLabel">20</span>回</div>
                </div>
            </div>
            <div id="statusMessage">アゴでタップしてスタート！</div>
        </div>

        <div class="actions">
            <button id="resetBtn" class="btn-reset">リセット</button>
        </div>

        <div class="calendar-card">
            <div id="calendarTitle" class="calendar-header">2026年 7月</div>
            <div class="calendar-grid" id="calendarGrid">
                </div>
        </div>
    </div>

    <script>
        let count = 0;
        let target = 20;
        let jaVoice = null;
        let isCompleted = false;

        const RADIUS = 70;
        const CIRCUMFERENCE = 2 * Math.PI * RADIUS;

        const tapZone = document.getElementById('tapZone');
        const counterEl = document.getElementById('counter');
        const progressBar = document.getElementById('progressBar');
        const targetSelect = document.getElementById('targetSelect');
        const targetLabel = document.getElementById('targetLabel');
        const resetBtn = document.getElementById('resetBtn');
        const statusMessage = document.getElementById('statusMessage');
        const totalStatsEl = document.getElementById('totalStats');
        const calendarGrid = document.getElementById('calendarGrid');
        const calendarTitle = document.getElementById('calendarTitle');

        progressBar.style.strokeDasharray = `${CIRCUMFERENCE} ${CIRCUMFERENCE}`;
        progressBar.style.strokeDashoffset = CIRCUMFERENCE;

        // 📅 今日の日付文字列を取得 (YYYY-MM-DD形式)
        function getTodayString() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // 💾 【カレンダー対応】データの読み込みと描画
        function loadLogs() {
            // 履歴データオブジェクトを取得（なければ空のオブジェクト）
            const logs = JSON.parse(localStorage.getItem('pushup_logs') || '{}');
            
            // 累計回数の計算
            let total = 0;
            for (let date in logs) {
                total += logs[date];
            }
            totalStatsEl.textContent = `累計: ${total}回`;

            renderCalendar(logs);
        }

        // 💾 【カレンダー対応】今日の回数を保存
        function saveLog(reps) {
            const logs = JSON.parse(localStorage.getItem('pushup_logs') || '{}');
            const today = getTodayString();
            
            // 今日の既存の回数にプラス
            logs[today] = (logs[today] || 0) + reps;
            
            localStorage.setItem('pushup_logs', JSON.stringify(logs));
            loadLogs(); // カレンダーと累計を再描画
        }

        // 📅 カレンダー描画エンジン（WeasyPrint互換のtable構造で出力）
        function renderCalendar(logs) {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth(); // 0-11
            
            calendarTitle.textContent = `${year}年 ${month + 1}月`;
            calendarGrid.innerHTML = '';

            // 曜日ヘッダー
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            let headerRow = document.createElement('div');
            headerRow.className = 'calendar-row';
            days.forEach(d => {
                const cell = document.createElement('div');
                cell.className = 'calendar-cell calendar-day-header';
                cell.textContent = d;
                headerRow.appendChild(cell);
            });
            calendarGrid.appendChild(headerRow);

            // 月の初日と総日数
            const firstDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            let currentDay = 1;
            let html = '';

            for (let i = 0; i < 6; i++) { // 最大6週間分
                let row = document.createElement('div');
                row.className = 'calendar-row';
                let hasCells = false;

                for (let j = 0; j < 7; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'calendar-cell';

                    if (i === 0 && j < firstDay) {
                        cell.innerHTML = '<span class="empty-cell">.</span>';
                    } else if (currentDay > totalDays) {
                        cell.innerHTML = '<span class="empty-cell">.</span>';
                    } else {
                        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(currentDay).padStart(2, '0')}`;
                        
                        // ✨ その日に筋トレ履歴（ログ）があれば緑丸にする
                        if (logs[dateStr] && logs[dateStr] > 0) {
                            cell.innerHTML = `<span class="workout-day" onclick="alert('${month+1}月${currentDay}日: ${logs[dateStr]}回トレ完了！')">${currentDay}</span>`;
                        } else {
                            cell.textContent = currentDay;
                        }
                        currentDay++;
                        hasCells = true;
                    }
                    row.appendChild(cell);
                }
                if (i > 0 && !hasCells) break; // 7日とも空ならループ終了
                calendarGrid.appendChild(row);
            }
        }

        // 音声エンジン
        function loadVoices() {
            const voices = speechSynthesis.getVoices();
            jaVoice = voices.find(voice => voice.lang === 'ja-JP' && voice.name.includes('Google')) || 
                      voices.find(voice => voice.lang === 'ja-JP' && voice.name.includes('Otoya')) || 
                      voices.find(voice => voice.lang === 'ja-JP');
        }
        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

        function speak(text, isFinish = false) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (jaVoice) utterance.voice = jaVoice;
            else utterance.lang = 'ja-JP';
            utterance.rate = 1.1;
            utterance.pitch = isFinish ? 1.0 : 0.8;
            speechSynthesis.speak(utterance);
        }

        function updateGauge() {
            const ratio = Math.min(count / target, 1);
            progressBar.style.strokeDashoffset = CIRCUMFERENCE - (ratio * CIRCUMFERENCE);
        }

        function handleCount() {
            if (isCompleted) return;

            count++;
            counterEl.textContent = count;
            updateGauge();
            saveLog(1); // 1回ごとに即時カレンダーデータへ保存・反映

            if (count >= target) {
                isCompleted = true;
                statusMessage.textContent = "🔥 NICE BULK!!! 🔥";
                speak("目標達成！ナイスバルク！", true);
            } else {
                speak(String(count));
            }
        }

        tapZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleCount();
        });
        tapZone.addEventListener('mousedown', (e) => {
            if (e.type === 'mousedown' && 'ontouchstart' in window) return;
            handleCount();
        });

        targetSelect.addEventListener('change', (e) => {
            target = parseInt(e.target.value);
            targetLabel.textContent = target;
            resetCount();
        });

        function resetCount() {
            count = 0;
            isCompleted = false;
            counterEl.textContent = "0";
            statusMessage.textContent = "アゴでタップしてスタート！";
            updateGauge();
            speechSynthesis.cancel();
        }
        resetBtn.addEventListener('click', resetCount);

        // 初期読み込み
        window.addEventListener('DOMContentLoaded', loadLogs);
    </script>
</body>
</html>
